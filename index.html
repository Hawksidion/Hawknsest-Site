<style>
  :root{
    --bg: #070707;
    --name-dim: #333336;
    --name-dimmer: #232326;
    --panel: #131315;
    --border: #232327;
    --border-hover: #3a3a3f;
    --text: #E9E9EA;
    --sub: #8A8A8E;
    --accent: #E14B3E;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Space Grotesk', sans-serif;
    overflow-x:hidden;
    position:relative;
  }

  /* ---- scrolling name background ---- */
  .name-field{
    position:fixed;
    inset:0;
    z-index:0;
    display:flex;
    flex-direction:column;
    gap:6px;
    padding-top:6px;
    -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
    mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
  }
  .row{
    display:flex;
    white-space:nowrap;
    width:max-content;
    animation: drift linear infinite;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    letter-spacing:0.02em;
  }
  .row span{
    color:var(--name-dim);
    padding:0 22px;
  }
  .row span:nth-child(3n){ color:var(--name-dimmer); }
  .row.left{ animation-name: drift-left; }
  .row.right{ animation-name: drift-right; }

  @keyframes drift-left{
    from{ transform:translateX(0%); }
    to{ transform:translateX(-50%); }
  }
  @keyframes drift-right{
    from{ transform:translateX(-50%); }
    to{ transform:translateX(0%); }
  }

  @media (prefers-reduced-motion: reduce){
    .row{ animation:none; }
  }

  /* ---- foreground content ---- */
  .wrap{
    position:relative;
    z-index:1;
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:72px 20px 56px;
  }

  .avatar{
    width:104px; height:104px;
    margin-bottom:20px;
    border-radius:50%;
    object-fit:cover;
    filter:drop-shadow(0 0 14px rgba(232,60,50,0.35));
  }

  h1{
    font-size:26px;
    font-weight:700;
    margin:0 0 6px;
    letter-spacing:-0.01em;
  }
  .handle{
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    color:var(--sub);
    margin-bottom:6px;
  }
  .tagline{
    font-size:13.5px;
    color:var(--sub);
    text-align:center;
    max-width:280px;
    line-height:1.5;
    margin-bottom:36px;
  }

  .links{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .link-btn{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:15px 18px;
    text-decoration:none;
    color:var(--text);
    transition:border-color 0.2s ease, transform 0.15s ease, background 0.2s ease;
  }
  .link-btn:hover,
  .link-btn:focus-visible{
    border-color:var(--border-hover);
    transform:translateY(-2px);
    background:#17171a;
  }
  .link-btn:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
  .link-btn .labels{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .link-btn .name{
    font-weight:600;
    font-size:14.5px;
  }
  .link-btn .desc{
    font-size:11.5px;
    color:var(--sub);
  }
  .link-btn .arrow{
    margin-left:auto;
    color:var(--sub);
    display:flex;
    transition:color 0.2s ease;
  }
  .link-btn:hover .arrow{ color:var(--accent); }

  footer{
    position:relative; z-index:1;
    text-align:center;
    padding:40px 20px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color:#4a4a4d;
    letter-spacing:0.06em;
  }
  footer span{ color:var(--accent); }
</style>
</head>

<footer>hawknest.xyz &nbsp;·&nbsp; <span id="footerCount">—</span> names and counting</footer>

<script>
  const BACKEND_URL = 'https://hawknest-backend.onrender.com';
  let names = ['be the first to follow']; // shown only until real data loads

  const field = document.getElementById('nameField');
  const durations = [75, 110, 88, 120, 82, 100, 94, 126]; // fixed, staggered speeds — same every load

  function renderRows() {
    field.innerHTML = '';
    const rowHeight = 25; // ~13px text + 6px gap, matches the CSS above
    const rowCount = Math.max(6, Math.ceil(window.innerHeight / rowHeight));
    const perRow = Math.min(names.length, 6);
    const minBlockWidth = window.innerWidth * 1.5; // comfortable margin so no gap ever shows

    for (let i = 0; i < rowCount; i++) {
      const rowNames = [];
      for (let j = 0; j < perRow; j++) {
        rowNames.push(names[(i + j) % names.length]);
      }

      const row = document.createElement('div');
      row.className = 'row ' + (i % 2 === 0 ? 'left' : 'right');
      row.style.animationDuration = durations[i % durations.length] + 's';
      field.appendChild(row); // append early so scrollWidth can be measured as we build it

      // keep adding names until this one "block" is wide enough to comfortably cover the screen
      const block = [];
      let n = 0;
      while (row.scrollWidth < minBlockWidth || block.length < perRow) {
        const span = document.createElement('span');
        span.textContent = rowNames[n % rowNames.length];
        row.appendChild(span);
        block.push(span);
        n++;
      }

      // duplicate the whole block exactly once — two identical halves is what makes
      // translateX(0% -> -50%) loop with no visible seam, at any screen width
      block.forEach(span => row.appendChild(span.cloneNode(true)));
    }
  }

  function loadNames() {
    fetch(BACKEND_URL + '/api/names')
      .then(r => r.json())
      .then(data => {
        if (data.length > 0) {
          const fetchedNames = data.map(d => d.name);
          const changed = JSON.stringify(fetchedNames) !== JSON.stringify(names);
          names = fetchedNames;
          document.getElementById('footerCount').textContent = names.length;
          if (changed) renderRows(); // only rebuild (and restart the scroll) if something's new
        }
      })
      .catch(() => { /* backend asleep or unreachable — keep showing current names */ });
  }

  renderRows();
  loadNames();

  // check for new followers every 30 seconds while the page is open
  setInterval(loadNames, 30000);

  // re-layout if the window is resized or a phone is rotated
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderRows, 200);
  });

  // TODO: replace `names` above with a fetch to the Twitch backend once it's live
</script>
